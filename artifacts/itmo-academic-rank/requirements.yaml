packages:
  "framer-motion": "For smooth page transitions and step animations in the application wizard"
  "@hookform/resolvers": "For Zod form validation in multi-step forms"
  "react-hook-form": "For managing complex form state in the wizard"
  "recharts": "For admin statistics and data visualization"
  "date-fns": "For formatting application and chat dates beautifully"
  "clsx": "For conditional class name merging"
  "tailwind-merge": "For safe tailwind class merging in UI components"

images:
  - path: "artifacts/itmo-academic-rank/public/images/hero-bg.png"
    description: "Abstract modern university campus architecture with blue glass windows and bright lighting, professional institutional style, light blue and white color palette"
    aspect_ratio: "16:9"
  - path: "artifacts/itmo-academic-rank/public/images/logo.png"
    description: "Minimalist corporate logo mark featuring letters ITMO in bold professional blue typography, transparent background"
    aspect_ratio: "1:1"

notes:
  - Auth token is stored in localStorage as 'itmo_token' to bypass the need to modify the shared customFetch.
  - Implemented custom TanStack query hooks that manually inject the Authorization header for all API requests.
  - Using ITMO official branding colors (Primary Blue: #2D5A9E).
