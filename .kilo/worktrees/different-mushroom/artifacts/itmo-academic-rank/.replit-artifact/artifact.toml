kind = "web"
previewPath = "/"
title = "ИТМО — Ассистент Учёного Звания"
version = "1.0.0"
id = "artifacts/itmo-academic-rank"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25448

[services.development]
run = "pnpm --filter @workspace/itmo-academic-rank run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/itmo-academic-rank", "run", "build" ]
publicDir = "artifacts/itmo-academic-rank/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25448"
BASE_PATH = "/"
